name: CI

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Run PHP lint
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            php -l "$file"
          done < <(find . -type f -name "*.php" -not -path "./.git/*")
